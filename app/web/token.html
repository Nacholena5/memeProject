<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Token Detail</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>

  <header class="hero">
    <div>
      <p class="eyebrow">TOKEN RESEARCH DETAIL</p>
      <h1 id="tokenTitle">Token</h1>
      <p class="subtitle" id="tokenSubtitle">-</p>
    </div>
    <div class="hero-actions">
      <a href="/" class="btn" style="text-decoration:none;display:inline-block;">Volver</a>
      <span id="tokenLastUpdate" class="muted">-</span>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Evolución scores</h2>
      <canvas id="scoreHistoryChart" height="120"></canvas>
    </section>

    <section class="card">
      <h2>Evolución precio</h2>
      <canvas id="priceHistoryChart" height="120"></canvas>
    </section>

    <section class="card" style="grid-column: 1 / -1;">
      <h2>Últimas señales</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Long</th>
              <th>Short</th>
              <th>Conf</th>
              <th>Precio</th>
              <th>Decisión</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/static/token.js"></script>
</body>
</html>
